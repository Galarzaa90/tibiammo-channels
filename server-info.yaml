- type: embed
  embeds:
    - title: "Welcome!"
      description: >-
        Welcome to /r/TibiaMMO's official Discord server!

        A place to discuss the game, hunting places, nostalgy or just shitposting!
      color: 0xBF2312
      thumbnail:
        url: https://styles.redditmedia.com/t5_2s3sk/styles/communityIcon_z4ns648v4yq31.png

    - title: "Rules"
      color: 0xBF2312
      description: >-
        - Keep the content relevant to the channel.
        
        - Try to keep conversations in english, except in the language specific channels.
        
        - No OpenTibia content allowed.
        
        - We respect the Tibia Rules, account trading, gold selling, botting tools are not allowed here.
        
        - Keep it SFW at all times.
        
        - Racist, homophobic, sexist or otherwise hateful comments will be removed, and will result in a ban.

        - Please try to remain civil. Attempts to annoy or harass will result in a warning or a ban at the moderators discretion.

        - No spamming.

